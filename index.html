<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公室專屬點唱機</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #121212; /* 深色背景 */
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 畫面全滿 */
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        p { color: #b3b3b3; margin-bottom: 40px; }
        .btn-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .btn-host { background: linear-gradient(45deg, #1e3c72, #2a5298); }
        .btn-guest { background: linear-gradient(45deg, #1DB954, #128C3E); } /* Spotify 綠 */
    </style>
</head>
<body>
    <h1>🎵 專屬點唱機 🎵</h1>
    <p>Music connects us. 請選擇你的模式</p>
    <div class="btn-container">
        <a href="host.html" class="btn btn-host">💻 我是大螢幕 (Host)</a>
        <a href="guest.html" class="btn btn-guest">📱 我要點歌 (Guest)</a>
    </div>
</body>
</html>
