<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>播放大螢幕</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #000; color: white; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        #startBtn { font-size: 18px; padding: 12px 30px; background: #ff4b2b; color: white; border: none; border-radius: 50px; cursor: pointer; }
        #skipBtn { display: none; font-size: 16px; padding: 12px 25px; background: #333; color: white; border: 1px solid #555; border-radius: 50px; cursor: pointer; margin-left: 10px; }
        #player-container { background: #121212; padding: 15px; border-radius: 16px; margin: 20px 0; }
        #queue-list { text-align: left; background: #181818; padding: 10px; border-radius: 10px; }
        .queue-item { padding: 15px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
        .remove-btn { background: #ff4b2b; color: white; border: none; width: 80px; height: 36px; border-radius: 6px; cursor: pointer; font-weight: bold; flex-shrink: 0; margin-left: 15px;}
        
        /* 🔥 新增：自製密碼視窗的樣式 */
        #customModal {
            display: none; /* 預設隱藏 */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* 半透明黑底 */
            z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #282828; padding: 30px; border-radius: 16px; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-content h3 { margin-top: 0; color: #1e88e5; }
        .modal-content input { width: 90%; padding: 10px; margin: 15px 0; border-radius: 8px; border: none; background: #121212; color: white; font-size: 16px; text-align: center; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 0 5px; }
        .btn-confirm { background: #1DB954; color: white; }
        .btn-cancel { background: #555; color: white; }
        #errorMsg { color: #ff4b2b; font-size: 14px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💻 播放主機</h2>
        <button id="startBtn" onclick="startParty()">🚀 啟動點唱機</button>
        <button id="skipBtn" onclick="requestSkip()">⏭️ 強制切歌</button>
        <div id="player-container"><div id="youtube-player"></div></div>
        <h3>待播清單：</h3>
        <div id="queue-list">載入中...</div>
    </div>

    <div id="customModal">
        <div class="modal-content">
            <h3>🔒 管理員驗證</h3>
            <div id="errorMsg">密碼錯誤，請重試！</div>
            <input type="password" id="adminPwd" placeholder="請輸入密碼...">
            <div>
                <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn btn-confirm" onclick="submitPassword()">確認</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="host.js"></script>
</body>
</html>
