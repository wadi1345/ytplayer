<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>點歌端 - 終極遙控器版</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; padding-bottom: 50px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { color: #1DB954; margin-bottom: 20px; margin-top: 0; }
        h3 { color: #b3b3b3; font-size: 16px; margin-top: 30px; border-left: 4px solid #1DB954; padding-left: 10px; }
        
        /* ✨ 正在播放的超美橫幅 */
        #now-playing-banner {
            background: linear-gradient(135deg, #1DB954, #0b5c25); padding: 15px 20px; border-radius: 12px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4); display: flex; flex-direction: row; justify-content: space-between; align-items: center;
        }
        #now-playing-banner .info-area { flex-grow: 1; overflow: hidden; }
        #now-playing-banner span.label { font-size: 12px; color: rgba(255,255,255,0.8); margin-bottom: 5px; font-weight: bold; display: block; }
        #now-playing-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #now-playing-user { font-size: 13px; color: rgba(255,255,255,0.9); }
        
        /* 🔥 新增：暫停按鈕樣式 */
        #playPauseBtn { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 10px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; flex-shrink: 0; margin-left: 15px; }
        #playPauseBtn:hover { background: rgba(0,0,0,0.5); }

        /* 🔊 音量控制區樣式 */
        .volume-control { display: flex; align-items: center; justify-content: space-between; background: #282828; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .volume-control span { font-size: 14px; color: #b3b3b3; margin-right: 15px; white-space: nowrap; font-weight: bold; }
        .volume-slider { flex-grow: 1; -webkit-appearance: none; background: #555; height: 6px; border-radius: 5px; outline: none; transition: 0.2s; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #1DB954; cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .input-group { background: #282828; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        label { display: block; font-size: 14px; color: #b3b3b3; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 15px; background: #3e3e3e; color: white; border: none; border-radius: 8px; font-size: 16px; }
        .search-btn { width: 100%; padding: 14px; background-color: #1DB954; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .tag-container { text-align: center; margin-top: 15px; }
        .tag-btn { background: #333; color: #b3b3b3; border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; margin: 4px; cursor: pointer; transition: 0.2s; }
        .tag-btn:hover { background: #1DB954; color: white; }

        .song-item { background: #181818; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .song-title-text { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; margin-right: 10px; }
        .add-btn { width: 70px; height: 35px; flex-shrink: 0; background: transparent; border: 1px solid #1DB954; color: #1DB954; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; }

        #live-queue { background: #181818; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #2a2a2a; }
        .queue-item { padding: 12px 0; border-bottom: 1px solid #2a2a2a; font-size: 14px; display: flex; align-items: center; justify-content: space-between; }
        .queue-item:last-child { border-bottom: none; }
        .queue-index { color: #1DB954; font-weight: bold; margin-right: 10px; min-width: 20px; }
        .queue-info { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .queue-user { font-size: 12px; color: #888; display: block; margin-top: 3px; }
        
        .remove-btn-small { background: #ff4b2b; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: 10px; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="now-playing-banner">
            <div class="info-area">
                <span class="label">✨ 正在播放</span>
                <div id="now-playing-title">載入中...</div>
                <div id="now-playing-user">等待大螢幕連線...</div>
            </div>
            <button id="playPauseBtn" onclick="togglePlayPause()">⏸️ 暫停</button>
        </div>

        <div class="volume-control">
            <span>🔊 派對音量</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
            <span id="volumeValue" style="margin-right: 0; margin-left: 15px; min-width: 35px; text-align: right; color:#1DB954;">100%</span>
        </div>

        <h2>📱 我要點歌</h2>
        
        <div class="input-group">
            <label>你的稱呼</label>
            <input type="text" id="userName" placeholder="輸入暱稱...">
            <label>搜尋歌曲或貼上連結</label>
            <input type="text" id="searchInput" placeholder="輸入歌名或 YouTube 網址...">
            <button class="search-btn" onclick="searchYouTube()">🔍 搜尋並挑選</button>
            
            <div class="tag-container">
                <span style="font-size: 12px; color: #666; display: block; margin-bottom: 8px;">沒靈感嗎？試試：</span>
                <button class="tag-btn" onclick="quickSearch('KTV 必點合唱')">🎤 KTV 必點</button>
                <button class="tag-btn" onclick="quickSearch('Lofi Hip Hop 讀書')">☕ Lofi 讀書</button>
                <button class="tag-btn" onclick="quickSearch('2024 抖音 神曲')">🎵 熱門神曲</button>
                <button class="tag-btn" onclick="quickSearch('經典 英文 老歌')">🎸 經典西洋</button>
            </div>
        </div>

        <div id="results"></div>

        <h3>🔥 目前排隊中...</h3>
        <div id="live-queue">讀取中...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBF5p7x31GP_O9ePRrhJbXJM9C6aPj4wiE",
            authDomain: "ytplayer-be8ef.firebaseapp.com",
            databaseURL: "https://ytplayer-be8ef-default-rtdb.firebaseio.com",
            projectId: "ytplayer-be8ef",
            storageBucket: "ytplayer-be8ef.firebasestorage.app",
            messagingSenderId: "812933574917",
            appId: "1:812933574917:web:a13e5ebef6c935c1d2076c",
            measurementId: "G-RF61ND1XZ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // ⚠️ 記得填入你的 YouTube API Key
        // ==========================================
        // 💡 升級版：自動備援 YouTube 金鑰庫
        // ==========================================
        const YOUTUBE_API_KEYS = [
            "AIzaSyB93SDscF6QCzu0a2-vDasQADQ6tow2m5k",
            "AIzaSyBWu-419w2f2cpUpJaQegWP7x_LfUKiUWw"
            // 如果以後有第三把、第四把，加個逗號繼續往下貼就好！
        ];
        let currentKeyIndex = 0; // 紀錄目前正在用第幾把鑰匙
        const ADMIN_PASSWORD = "1234";

        window.onload = () => { document.getElementById('userName').value = localStorage.getItem('savedName') || ''; };

        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function quickSearch(keyword) { document.getElementById('searchInput').value = keyword; searchYouTube(); }

        function searchYouTube() {
            const input = document.getElementById('searchInput').value.trim();
            if (!input) return alert('請輸入歌名！');
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p style="text-align:center; color:#888;">搜尋中...</p>';
            
            const videoId = extractVideoID(input);
            const currentKey = YOUTUBE_API_KEYS[currentKeyIndex]; // 拿出目前的鑰匙
            
            const url = videoId 
                ? `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${currentKey}`
                : `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${input}&type=video&key=${currentKey}`;

            fetch(url).then(res => {
                // 💡 偵測額度是否用完 (狀態碼 403)
                if (!res.ok) {
                    if (res.status === 403) {
                        currentKeyIndex++; // 換下一把鑰匙
                        if (currentKeyIndex < YOUTUBE_API_KEYS.length) {
                            console.log(`第 ${currentKeyIndex} 把金鑰額度耗盡，自動切換至備用金鑰...`);
                            searchYouTube(); // 重新觸發一次搜尋
                            return null; // 停止原本的壞流程
                        } else {
                            throw new Error('quota_exceeded'); // 所有鑰匙都斷了
                        }
                    }
                    throw new Error('network_error');
                }
                return res.json();
            })
            .then(data => {
                if (!data) return; // 如果正在切換金鑰，就先跳出
                
                resultsDiv.innerHTML = '';
                if(data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const id = videoId || item.id.videoId;
                        if (!id) return;
                        const title = item.snippet.title;
                        const safeTitle = title.replace(/'/g, "\\'").replace(/"/g, "&quot;"); // 防禦雙引號
                        resultsDiv.innerHTML += `
                            <div class="song-item">
                                <div class="song-title-text">🎵 ${title}</div>
                                <button class="add-btn" onclick="addToQueue('${id}', '${safeTitle}')">加入</button>
                            </div>`;
                    });
                } else {
                    resultsDiv.innerHTML = '<p style="color:#b3b3b3;">找不到結果，請換個關鍵字。</p>';
                }
            })
            .catch(err => {
                // 💡 友善的錯誤提示
                if (err.message === 'quota_exceeded') {
                    resultsDiv.innerHTML = '<p style="color:#ff4b2b; text-align:center;">😱 哎呀！今天所有的搜尋額度都用完了！<br>請改用「貼上 YouTube 網址」的方式點歌喔！</p>';
                    // 把索引歸零，明天重新從第一把開始試
                    currentKeyIndex = 0; 
                } else {
                    resultsDiv.innerHTML = '<p style="color:#ff4b2b; text-align:center;">網路連線錯誤，請稍後再試。</p>';
                }
            });
        }

        function addToQueue(id, title) {
            const name = document.getElementById('userName').value || '神祕人';
            localStorage.setItem('savedName', name);
            db.ref('queue').push({ videoId: id, title: title, nickname: name, timestamp: Date.now() })
              .then(() => { alert('✅ 已加入歌單！'); document.getElementById('searchInput').value = ''; document.getElementById('results').innerHTML = ''; });
        }

        // ==========================================
        // 渲染清單
        // ==========================================
        db.ref('queue').orderByChild('timestamp').on('value', (snapshot) => {
            const queueListDiv = document.getElementById('live-queue');
            queueListDiv.innerHTML = '';
            
            const songs = [];
            snapshot.forEach((child) => { songs.push({ key: child.key, ...child.val() }); });

            if (songs.length > 0) {
                const current = songs[0];
                document.getElementById('now-playing-title').innerText = current.title;
                document.getElementById('now-playing-user').innerText = '點歌人：' + current.nickname;

                for (let i = 1; i < songs.length; i++) {
                    const song = songs[i];
                    queueListDiv.innerHTML += `
                        <div class="queue-item">
                            <span class="queue-index">${i}</span>
                            <div class="queue-info">
                                <span style="color:#fff;">${song.title}</span>
                                <span class="queue-user">點歌人：${song.nickname}</span>
                            </div>
                            <button class="remove-btn-small" onclick="removeSongFromGuest('${song.key}')">移除</button>
                        </div>`;
                }

                if (songs.length === 1) queueListDiv.innerHTML = '<p style="text-align:center; color:#666; font-size:14px; padding:10px 0;">目前沒有下一首歌，快點一首！</p>';
            } else {
                document.getElementById('now-playing-title').innerText = '📻 派對電台放送中...';
                document.getElementById('now-playing-user').innerText = '快來點首新歌吧！';
                queueListDiv.innerHTML = '<p style="text-align:center; color:#666; font-size:14px; padding:10px 0;">目前沒人排隊，快來當第一個！</p>';
            }
        });

        function removeSongFromGuest(songKey) {
            const pwd = prompt("請輸入管理員密碼以移除歌曲：");
            if (pwd === ADMIN_PASSWORD) db.ref('queue/' + songKey).remove();
            else if (pwd !== null) alert("密碼錯誤，只有管理員可以刪除歌曲喔！🚫");
        }

        // ==========================================
        // 音量與暫停功能即時同步
        // ==========================================
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        db.ref('volume').on('value', (snapshot) => {
            let vol = snapshot.val();
            if (vol !== null) { volumeSlider.value = vol; volumeValue.innerText = vol + '%'; }
        });
        function changeVolume(val) {
            volumeValue.innerText = val + '%';
            db.ref('volume').set(parseInt(val));
        }

        // 🔥 暫停與播放邏輯
        let isCurrentlyPaused = false;
        const playPauseBtn = document.getElementById('playPauseBtn');

        db.ref('isPaused').on('value', (snapshot) => {
            isCurrentlyPaused = snapshot.val() || false;
            
            if (isCurrentlyPaused) {
                playPauseBtn.innerText = '▶️ 繼續';
                playPauseBtn.style.background = '#ff4b2b'; 
                playPauseBtn.style.borderColor = '#ff4b2b';
            } else {
                playPauseBtn.innerText = '⏸️ 暫停';
                playPauseBtn.style.background = 'rgba(0, 0, 0, 0.3)';
                playPauseBtn.style.borderColor = 'rgba(255, 255, 255, 0.5)';
            }
        });

        function togglePlayPause() {
            db.ref('isPaused').set(!isCurrentlyPaused);
        }
    </script>
</body>
</html>
