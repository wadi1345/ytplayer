<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>點歌端 - 最終除魔版</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; padding-bottom: 50px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { color: #1DB954; margin-bottom: 20px; }
        
        /* ✨ 正在播放橫幅 */
        #now-playing-banner { background: linear-gradient(135deg, #1DB954, #0b5c25); padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(29,185,84,0.4); display: flex; flex-direction: row; justify-content: space-between; align-items: center; }
        #now-playing-title { font-size: 18px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* 🔊 音量與按鈕 */
        .volume-control { display: flex; align-items: center; justify-content: space-between; background: #282828; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; }
        .volume-slider { flex-grow: 1; -webkit-appearance: none; background: #555; height: 6px; border-radius: 5px; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #1DB954; cursor: pointer; }

        .input-group { background: #282828; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 15px; background: #3e3e3e; color: white; border: none; border-radius: 8px; }
        .search-btn { width: 100%; padding: 14px; background-color: #1DB954; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }

        /* 排隊清單 */
        #live-queue { background: #181818; padding: 15px; border-radius: 12px; border: 1px solid #2a2a2a; min-height: 50px; }
        .queue-item { padding: 12px 0; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
        .queue-info { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        .remove-btn-small { background: #ff4b2b; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: 10px; }

        /* 偵錯區域：如果清單消失，這裡會顯示原因 */
        #debug-info { margin-top: 20px; font-size: 10px; color: #555; word-break: break-all; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #282828; width: 90%; max-width: 500px; max-height: 80vh; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .playlist-items { flex-grow: 1; overflow-y: auto; background: #181818; border-radius: 8px; padding: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="now-playing-banner">
            <div style="overflow: hidden;">
                <span style="font-size: 12px; opacity: 0.8;">✨ 正在播放</span>
                <div id="now-playing-title">等待中...</div>
            </div>
            <button id="playPauseBtn" onclick="togglePlayPause()" style="background:rgba(0,0,0,0.3); color:white; border:1px solid #fff; padding:8px 12px; border-radius:20px; cursor:pointer;">⏸️ 暫停</button>
        </div>

        <div class="volume-control">
            <span style="font-size:14px; margin-right:10px;">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
        </div>

        <div class="input-group">
            <input type="text" id="userName" placeholder="你的暱稱...">
            <input type="text" id="searchInput" placeholder="搜尋歌名或貼上 YouTube 網址/清單...">
            <button class="search-btn" onclick="searchYouTube()">🔍 點歌 / 匯入清單</button>
        </div>

        <div id="results"></div>

        <h3>🔥 目前排隊中...</h3>
        <div id="live-queue">連線中...</div>
        
        <div id="debug-info"></div>
    </div>

    <div id="playlistModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="color:#1DB954;">📋 預覽清單 (前 20 首)</h3>
            <div class="playlist-items" id="playlistItemsContainer"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="closePlaylistModal()" style="flex:1; padding:12px; background:#444; border:none; color:white; border-radius:8px;">取消</button>
                <button onclick="batchAddPlaylist()" style="flex:1; padding:12px; background:#1DB954; border:none; color:white; border-radius:8px; font-weight:bold;">全部加入</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBF5p7x31GP_O9ePRrhJbXJM9C6aPj4wiE",
            authDomain: "ytplayer-be8ef.firebaseapp.com",
            databaseURL: "https://ytplayer-be8ef-default-rtdb.firebaseio.com",
            projectId: "ytplayer-be8ef",
            storageBucket: "ytplayer-be8ef.firebasestorage.app",
            messagingSenderId: "812933574917",
            appId: "1:812933574917:web:a13e5ebef6c935c1d2076c",
            measurementId: "G-RF61ND1XZ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const YOUTUBE_API_KEYS = ["AIzaSyB93SDscF6QCzu0a2-vDasQADQ6tow2m5k", "AIzaSyBWu-419w2f2cpUpJaQegWP7x_LfUKiUWw"];
        let currentKeyIndex = 0;
        let currentQueue = [];
        let pendingPlaylistItems = [];

        window.onload = () => { document.getElementById('userName').value = localStorage.getItem('savedName') || ''; };

        // 搜尋邏輯
        function searchYouTube() {
            const input = document.getElementById('searchInput').value.trim();
            if (!input) return;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '搜尋中...';
            
            const listId = (input.match(/[?&]list=([^#\&\?]+)/) || [])[1];
            const vId = (input.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/) || [])[2];

            if (listId) {
                fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=20&playlistId=${listId}&key=${YOUTUBE_API_KEYS[currentKeyIndex]}`)
                .then(res => res.json()).then(data => {
                    pendingPlaylistItems = data.items.map(it => ({ id: it.snippet.resourceId.videoId, title: it.snippet.title }));
                    const container = document.getElementById('playlistItemsContainer');
                    container.innerHTML = pendingPlaylistItems.map(it => `<div style="padding:5px; font-size:12px; border-bottom:1px solid #333;">🎵 ${it.title}</div>`).join('');
                    document.getElementById('playlistModal').style.display = 'flex';
                }).catch(() => { /* 降級搜尋單曲 */ if(vId) searchSingle(vId); });
            } else if (vId) {
                searchSingle(vId);
            } else {
                fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(input)}&type=video&key=${YOUTUBE_API_KEYS[currentKeyIndex]}`)
                .then(res => res.json()).then(renderResults);
            }
        }

        function searchSingle(id) {
            fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${YOUTUBE_API_KEYS[currentKeyIndex]}`)
            .then(res => res.json()).then(renderResults);
        }

        function renderResults(data) {
            const div = document.getElementById('results');
            div.innerHTML = (data.items || []).map(it => {
                const id = it.id.videoId || it.id;
                const title = it.snippet.title.replace(/'/g, "");
                return `<div class="song-item"><span>🎵 ${title}</span><button class="add-btn" onclick="addToQueue('${id}', '${title}')">加入</button></div>`;
            }).join('');
        }

        function addToQueue(id, title) {
            const name = document.getElementById('userName').value || '辦公室 DJ';
            localStorage.setItem('savedName', name);
            db.ref().push({ videoId: id, title: title, nickname: name, timestamp: Date.now() });
            document.getElementById('results').innerHTML = '✅ 已加入！';
            setTimeout(() => document.getElementById('results').innerHTML = '', 2000);
        }

        function batchAddPlaylist() {
            const name = document.getElementById('userName').value || '辦公室 DJ';
            const now = Date.now();
            pendingPlaylistItems.forEach((it, i) => {
                db.ref().push({ videoId: it.id, title: it.title, nickname: name, timestamp: now + i });
            });
            closePlaylistModal();
        }

        function closePlaylistModal() { document.getElementById('playlistModal').style.display = 'none'; }

        // ==========================================
        // 💡 終極地毯式搜尋：不管在哪裡，只要是歌就抓出來
        // ==========================================
        db.ref().on('value', (snapshot) => {
            const rawData = snapshot.val();
            const queueDiv = document.getElementById('live-queue');
            const debugDiv = document.getElementById('debug-info');
            
            let songs = [];

            if (rawData) {
                // 1. 檢查最外層
                Object.keys(rawData).forEach(key => {
                    const item = rawData[key];
                    if (item && item.videoId) {
                        songs.push({ key, ...item });
                    }
                });

                // 2. 檢查是否有個叫 queue 的資料夾 (預防萬一)
                if (rawData.queue) {
                    Object.keys(rawData.queue).forEach(key => {
                        const item = rawData.queue[key];
                        if (item && item.videoId) {
                            songs.push({ key, ...item });
                        }
                    });
                }
            }

            // 💡 排序：時間戳小的在前面，沒時間戳的視為舊歌排最前
            songs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            currentQueue = songs;

            if (songs.length > 0) {
                document.getElementById('now-playing-title').innerText = songs[0].title;
                let html = '';
                for (let i = 1; i < songs.length; i++) {
                    html += `<div class="queue-item"><div class="queue-info"><span class="queue-index">${i}</span> ${songs[i].title}</div><button class="remove-btn-small" onclick="removeSong('${songs[i].key}')">移除</button></div>`;
                }
                queueDiv.innerHTML = html || '<p style="text-align:center; color:#666;">沒有下一首歌。</p>';
            } else {
                document.getElementById('now-playing-title').innerText = '📻 廣播中...';
                queueDiv.innerHTML = '目前沒人點歌。';
            }
            
            // 偵錯用：如果還是沒畫面，這裡會顯示到底抓到了什麼
            debugDiv.innerText = `偵測到物件數：${Object.keys(rawData || {}).length} | 識別為歌曲數：${songs.length}`;
        });

        function removeSong(key) { 
            const pwd = prompt("密碼："); 
            if(pwd === "1234") {
                db.ref(key).remove(); 
                db.ref('queue/' + key).remove(); // 同時嘗試刪除兩個地方
            }
        }
        function togglePlayPause() { db.ref('isPaused').once('value', s => db.ref('isPaused').set(!s.val())); }
        function changeVolume(v) { db.ref('volume').set(parseInt(v)); }
        db.ref('isPaused').on('value', s => { document.getElementById('playPauseBtn').innerText = s.val() ? '▶️ 繼續' : '⏸️ 暫停'; });
    </script>
</body>
</html>
