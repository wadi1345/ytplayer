<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>點歌端</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .header a { color: #b3b3b3; text-decoration: none; font-size: 14px; }
        h2 { margin: 0; color: #1DB954; }
        
        .input-group { background: #282828; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        label { display: block; font-size: 14px; color: #b3b3b3; margin-bottom: 8px; }
        input[type="text"] { width: calc(100% - 24px); padding: 12px; font-size: 16px; margin-bottom: 15px; background: #3e3e3e; color: white; border: none; border-radius: 8px; outline: none; }
        input[type="text"]:focus { background: #4a4a4a; box-shadow: 0 0 0 2px #1DB954; }
        button { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #1DB954; color: white; border: none; border-radius: 50px; transition: 0.2s; }
        button:hover { background-color: #1ed760; transform: scale(1.02); }

        #results { margin-top: 20px; }
        .song-item { background: #181818; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; transition: background 0.2s; }
        .song-item:hover { background: #282828; }
        .song-title { font-size: 15px; line-height: 1.4; padding-right: 15px; }
        .add-btn { width: auto; background-color: transparent; border: 1px solid #1DB954; color: #1DB954; padding: 8px 16px; font-size: 14px; }
        .add-btn:hover { background-color: #1DB954; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📱 點歌區</h2>
            <a href="index.html">⬅️ 回大廳</a>
        </div>

        <div class="input-group">
            <label for="userName">你是哪位大明星？</label>
            <input type="text" id="userName" placeholder="輸入你的暱稱 (例如：王小明)">
            
            <label for="searchInput">想聽什麼歌？</label>
            <input type="text" id="searchInput" placeholder="搜尋歌手或歌名...">
            
            <button onclick="searchYouTube()">🔍 搜尋 YouTube</button>
        </div>

        <div id="results"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
