<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>辦公室點歌 - 高質感 Pro 版</title>
    <style>
        :root { --spotify-green: #1DB954; --bg-black: #121212; --card-gray: #181818; --hover-gray: #282828; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; padding: 20px; padding-bottom: 60px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* ✨ 正在播放卡片 */
        #now-playing-card { background: linear-gradient(135deg, #2a2a2a, #000); border-radius: 16px; padding: 20px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; position: relative; overflow: hidden; }
        #now-playing-card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(29,185,84,0.1) 0%, transparent 70%); pointer-events: none; }
        #now-playing-title { font-size: 20px; font-weight: bold; color: var(--spotify-green); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playing-info { font-size: 13px; color: #b3b3b3; display: flex; align-items: center; gap: 8px; }

        /* 🔊 控制區 */
        .control-strip { display: flex; align-items: center; gap: 15px; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 50px; }
        .vol-slider { flex-grow: 1; -webkit-appearance: none; background: #444; height: 4px; border-radius: 2px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; }
        .btn-main { background: var(--spotify-green); color: black; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }

        /* 點歌輸入區 */
        .search-box { background: var(--card-gray); padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #2a2a2a; }
        input[type="text"] { width: 100%; padding: 12px 15px; margin-bottom: 12px; background: #2a2a2a; color: white; border: 1px solid #3d3d3d; border-radius: 8px; font-size: 15px; box-sizing: border-box; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--spotify-green); outline: none; background: #333; }
        .btn-search { width: 100%; padding: 14px; background: var(--spotify-green); color: #000; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* 排隊清單 UI */
        .section-title { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        #live-queue { display: flex; flex-direction: column; gap: 10px; }
        .queue-item { background: var(--card-gray); padding: 12px 15px; border-radius: 10px; display: flex; align-items: center; transition: 0.2s; border: 1px solid transparent; }
        .queue-item:hover { background: var(--hover-gray); border-color: #333; }
        .q-index { font-size: 14px; color: var(--spotify-green); font-weight: bold; width: 25px; }
        .q-content { flex-grow: 1; overflow: hidden; margin-right: 10px; }
        .q-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .q-meta { font-size: 11px; color: #888; }
        
        /* 隱藏功能按鈕區 */
        .q-actions { display: flex; gap: 8px; }
        .act-btn { background: #333; border: none; color: #fff; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .act-btn:hover { background: #444; }
        .btn-like { color: #ff4b91; }
        .btn-skip { color: #ff9800; }
        .btn-del { color: #ff4b2b; }

        /* 搜尋結果樣式 */
        .res-item { background: #1f1f1f; margin-top: 8px; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-body { background: var(--card-gray); width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <div id="now-playing-card">
            <div id="now-playing-title">📻 準備播放中...</div>
            <div class="playing-info">
                <span id="now-playing-user">點歌人：系統</span> • <span id="queue-count">0 首待播</span>
            </div>
            <div class="control-strip">
                <button id="playPauseBtn" class="btn-main" onclick="togglePlayPause()">⏸️ 暫停</button>
                <input type="range" class="vol-slider" id="volumeSlider" min="0" max="100" oninput="changeVolume(this.value)">
                <span id="vol-label" style="font-size:12px; width:25px;">100</span>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="userName" placeholder="👤 你的稱呼 (儲存於本機)">
            <input type="text" id="searchInput" placeholder="🔍 搜尋歌名、YT 網址或 20 首清單">
            <button class="btn-search" onclick="searchYouTube()">即刻點歌</button>
            <div id="results"></div>
        </div>

        <div class="section-title">🔥 接下來播放</div>
        <div id="live-queue">載入動態清單中...</div>
    </div>

    <div id="playlistModal" class="modal-overlay" style="display: none;">
        <div class="modal-body">
            <h3 style="margin-top:0; color:var(--spotify-green);">📋 偵測到播放清單 (前 20 首)</h3>
            <div id="playlistItemsContainer" style="max-height: 300px; overflow-y: auto; margin: 15px 0; background: #000; padding: 10px; border-radius: 10px;"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="closePlaylistModal()" style="flex:1; padding:12px; background:#333; border:none; color:white; border-radius:50px; cursor:pointer;">取消</button>
                <button onclick="batchAddPlaylist()" style="flex:1; padding:12px; background:var(--spotify-green); border:none; color:black; border-radius:50px; font-weight:bold; cursor:pointer;">全部匯入</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBF5p7x31GP_O9ePRrhJbXJM9C6aPj4wiE",
            authDomain: "ytplayer-be8ef.firebaseapp.com",
            databaseURL: "https://ytplayer-be8ef-default-rtdb.firebaseio.com",
            projectId: "ytplayer-be8ef",
            storageBucket: "ytplayer-be8ef.firebasestorage.app",
            messagingSenderId: "812933574917",
            appId: "1:812933574917:web:a13e5ebef6c935c1d2076c",
            measurementId: "G-RF61ND1XZ8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const YOUTUBE_API_KEYS = ["AIzaSyB93SDscF6QCzu0a2-vDasQADQ6tow2m5k", "AIzaSyBWu-419w2f2cpUpJaQegWP7x_LfUKiUWw"];
        let currentKeyIndex = 0;
        let currentQueue = [];
        let pendingItems = [];

        window.onload = () => { document.getElementById('userName').value = localStorage.getItem('savedName') || ''; };

        // 搜尋功能
        function searchYouTube() {
            const input = document.getElementById('searchInput').value.trim();
            if (!input) return;
            const listId = (input.match(/[?&]list=([^#\&\?]+)/) || [])[1];
            const vId = (input.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/) || [])[2];

            if (listId) {
                fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=20&playlistId=${listId}&key=${YOUTUBE_API_KEYS[currentKeyIndex]}`)
                .then(res => res.json()).then(data => {
                    pendingItems = data.items.map(it => ({ id: it.snippet.resourceId.videoId, title: it.snippet.title }));
                    document.getElementById('playlistItemsContainer').innerHTML = pendingItems.map(it => `<div style="padding:5px; font-size:12px; border-bottom:1px solid #222;">🎵 ${it.title}</div>`).join('');
                    document.getElementById('playlistModal').style.display = 'flex';
                });
            } else if (vId) {
                fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${vId}&key=${YOUTUBE_API_KEYS[currentKeyIndex]}`)
                .then(res => res.json()).then(renderResults);
            } else {
                fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(input)}&type=video&key=${YOUTUBE_API_KEYS[currentKeyIndex]}`)
                .then(res => res.json()).then(renderResults);
            }
        }

        function renderResults(data) {
            document.getElementById('results').innerHTML = (data.items || []).map(it => {
                const id = it.id.videoId || it.id;
                const title = it.snippet.title.replace(/'/g, "");
                return `<div class="res-item"><span style="font-size:13px; max-width:70%; overflow:hidden;">${title}</span><button class="btn-main" onclick="addToQueue('${id}', '${title}')">點播</button></div>`;
            }).join('');
        }

        function addToQueue(id, title) {
            const name = document.getElementById('userName').value || '匿名同事';
            localStorage.setItem('savedName', name);
            if (currentQueue.some(s => s.videoId === id)) return alert('這首歌已經在排隊囉！');
            db.ref().push({ videoId: id, title: title, nickname: name, timestamp: Date.now(), likes: 0 });
            document.getElementById('results').innerHTML = '';
            document.getElementById('searchInput').value = '';
        }

        function batchAddPlaylist() {
            const name = document.getElementById('userName').value || '匿名同事';
            const now = Date.now();
            pendingItems.forEach((it, i) => {
                if (!currentQueue.some(s => s.videoId === it.id)) {
                    db.ref().push({ videoId: it.id, title: it.title, nickname: name, timestamp: now + i });
                }
            });
            closePlaylistModal();
        }

        function closePlaylistModal() { document.getElementById('playlistModal').style.display = 'none'; }

        // 核心監聽：維持地毯式掃描，但加上精美 UI
        db.ref().on('value', (snapshot) => {
            const data = snapshot.val() || {};
            let songs = [];
            Object.keys(data).forEach(k => {
                if (data[k] && data[k].videoId) songs.push({ key: k, ...data[k] });
            });
            songs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            currentQueue = songs;

            const qDiv = document.getElementById('live-queue');
            document.getElementById('queue-count').innerText = `${songs.length} 首待播`;

            if (songs.length > 0) {
                const cur = songs[0];
                document.getElementById('now-playing-title').innerText = cur.title;
                document.getElementById('now-playing-user').innerText = `點歌人：${cur.nickname || '舊系統'}`;
                
                let html = '';
                for (let i = 1; i < songs.length; i++) {
                    const s = songs[i];
                    html += `
                        <div class="queue-item">
                            <div class="q-index">${i}</div>
                            <div class="q-content">
                                <span class="q-title">${s.title}</span>
                                <span class="q-meta">👤 ${s.nickname || '神秘同事'} · ❤️ ${s.likes || 0}</span>
                            </div>
                            <div class="q-actions">
                                <button class="act-btn btn-like" onclick="likeSong('${s.key}', ${s.likes || 0})">❤️</button>
                                <button class="act-btn btn-skip" onclick="voteSkip('${s.key}')">⏭️</button>
                                <button class="act-btn btn-del" onclick="removeSong('${s.key}')">🗑️</button>
                            </div>
                        </div>`;
                }
                qDiv.innerHTML = html || '<p style="text-align:center; color:#555;">清單空空如也...</p>';
            } else {
                document.getElementById('now-playing-title').innerText = '📻 廣播中...';
                qDiv.innerHTML = '<p style="text-align:center; color:#555;">快點首歌來聽吧！</p>';
            }
        });

        // 隱藏功能邏輯
        function likeSong(key, current) { db.ref(key + '/likes').set(current + 1); }
        function voteSkip(key) { if(confirm("想要切換到這首歌嗎？")) { db.ref(key + '/timestamp').set(Date.now() - 9999999); } }
        function removeSong(key) { if(prompt("管理員密碼：") === "1234") db.ref(key).remove(); }
        function togglePlayPause() { db.ref('isPaused').once('value', s => db.ref('isPaused').set(!s.val())); }
        function changeVolume(v) { db.ref('volume').set(parseInt(v)); }

        db.ref('volume').on('value', s => { if(s.val()!==null) { document.getElementById('volumeSlider').value = s.val(); document.getElementById('vol-label').innerText = s.val(); }});
        db.ref('isPaused').on('value', s => { document.getElementById('playPauseBtn').innerText = s.val() ? '▶️ 繼續' : '⏸️ 暫停'; });
    </script>
</body>
</html>
