<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>點歌端 - 質感深色版</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { color: #1DB954; margin-bottom: 20px; }
        .input-group { background: #282828; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #b3b3b3; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 15px; background: #3e3e3e; color: white; border: none; border-radius: 8px; }
        button { width: 100%; padding: 14px; background-color: #1DB954; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
        /* 調整歌曲項目的佈局 */
.song-item {
    background: #181818;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;             /* 啟用彈性佈局 */
    justify-content: space-between; /* 左右對齊 */
    align-items: center;       /* 垂直置中 */
    border: 1px solid #333;
}

/* 統一「加入」按鈕的大小與間距 */
.add-btn {
    background: transparent;
    border: 1px solid #1DB954;
    color: #1DB954;
    
    /* 關鍵：設定固定寬度 */
    width: 70px;               /* 統一寬度 */
    height: 35px;              /* 統一高度 */
    flex-shrink: 0;            /* 防止按鈕被左邊長文字擠扁 */
    margin-left: 10px;         /* 與標題保持間距 */
    
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: 0.2s;
}

.add-btn:hover {
    background: #1DB954;
    color: white;
}

/* 防止歌名太長把按鈕擠掉 */
.song-title-text {
    flex-grow: 1;              /* 佔滿剩餘空間 */
    overflow: hidden;          /* 隱藏溢出內容 */
    text-overflow: ellipsis;   /* 文字過長顯示 ... */
    display: -webkit-box;
    -webkit-line-clamp: 2;     /* 最多顯示兩行 */
    -webkit-box-orient: vertical;
    font-size: 15px;
    line-height: 1.4;
}
    </style>
</head>
<body>
    <div class="container">
        <h2>📱 我要點歌</h2>
        <div class="input-group">
            <label>你的稱呼</label>
            <input type="text" id="userName" placeholder="例如：阿毛、Emma、碗宜">
            <label>搜尋歌曲或貼上 YouTube 網址</label>
            <input type="text" id="searchInput" placeholder="輸入歌名或網址...">
            <button onclick="searchYouTube()">🔍 搜尋 / 點擊</button>
        </div>
        <div id="results"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
    apiKey: "AIzaSyBF5p7x31GP_O9ePRrhJbXJM9C6aPj4wiE",
    authDomain: "ytplayer-be8ef.firebaseapp.com",
    databaseURL: "https://ytplayer-be8ef-default-rtdb.firebaseio.com",
    projectId: "ytplayer-be8ef",
    storageBucket: "ytplayer-be8ef.firebasestorage.app",
    messagingSenderId: "812933574917",
    appId: "1:812933574917:web:a13e5ebef6c935c1d2076c",
    measurementId: "G-RF61ND1XZ8"
  };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const YOUTUBE_API_KEY = 'AIzaSyB93SDscF6QCzu0a2-vDasQADQ6tow2m5k';

        // 自動載入上次的名字
        window.onload = () => { document.getElementById('userName').value = localStorage.getItem('savedName') || ''; };

        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function searchYouTube() {
            const input = document.getElementById('searchInput').value.trim();
            if (!input) return alert('請輸入內容');
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>搜尋中...</p>';
            
            const videoId = extractVideoID(input);
            const url = videoId 
                ? `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${YOUTUBE_API_KEY}`
                : `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${input}&type=video&key=${YOUTUBE_API_KEY}`;

            fetch(url).then(res => res.json()).then(data => {
                resultsDiv.innerHTML = '';
                data.items.forEach(item => {
                    const id = videoId || item.id.videoId;
                    const title = item.snippet.title;
                    const safeTitle = title.replace(/'/g, "\\'");
                    resultsDiv.innerHTML += `
    <div class="song-item">
        <div class="song-title-text">🎵 ${title}</div>
        <button class="add-btn" onclick="addToQueue('${id}', '${safeTitle}')">加入</button>
    </div>`;
                });
            });
        }

        function addToQueue(id, title) {
            const name = document.getElementById('userName').value || '神祕人';
            localStorage.setItem('savedName', name);
            db.ref('queue').push({ videoId: id, title: title, nickname: name, timestamp: Date.now() })
              .then(() => alert('已加入歌單！'));
        }
    </script>
</body>
</html>
